<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rep Madness — Rankings.io</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060e;--surface:#0d0d1a;--surface2:#12122a;--border:#1a1a36;
  --red:#e74c3c;--red-glow:rgba(231,76,60,.3);--blue:#3498db;--blue-glow:rgba(52,152,219,.3);
  --lime:#c8ff00;--cyan:#00d4ff;--magenta:#ff2d78;--gold:#ffd700;--orange:#ff8c00;
  --text:#e8e8f0;--dim:#5a5a7a;--dim2:#3a3a5a;
  --head:'Bebas Neue',sans-serif;
  --sub:'Barlow Condensed',sans-serif;
  --body:'DM Sans',sans-serif;
  --court:#c17f3a;--court-line:rgba(255,255,255,.55);--court-dark:#a06a2c;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--body)}

/* ─── BANNER ─── */
.banner{width:100%;max-height:400px;overflow:hidden;position:relative}
.banner img{width:100%;display:block;object-fit:cover;object-position:center top}
.banner-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 75%,var(--bg) 100%)}

/* ─── SCOREBOARD ─── */
.scoreboard{display:flex;align-items:center;justify-content:center;gap:1.5rem;padding:1.5rem 1rem .5rem;position:relative}
.sb-team{display:flex;flex-direction:column;align-items:center;gap:.25rem;min-width:120px}
.sb-team-name{font-family:var(--head);font-size:1.8rem;letter-spacing:.1em}
.sb-team-name.red{color:var(--red)}
.sb-team-name.blue{color:var(--blue)}
.sb-score{font-family:var(--head);font-size:4rem;letter-spacing:.05em;line-height:1;transition:all .3s}
.sb-score.red{color:var(--red);text-shadow:0 0 30px var(--red-glow)}
.sb-score.blue{color:var(--blue);text-shadow:0 0 30px var(--blue-glow)}
.sb-score.flash{transform:scale(1.3);filter:brightness(1.5)}
.sb-vs{font-family:var(--head);font-size:1.5rem;color:var(--dim);letter-spacing:.15em}
.sb-week{font-family:var(--sub);font-size:.85rem;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;text-align:center;padding:.25rem 0 .5rem}
.sb-cumulative{display:flex;justify-content:center;gap:2rem;padding:.25rem 0 1rem}
.sb-cum-item{font-family:var(--sub);font-size:.75rem;letter-spacing:.1em;color:var(--dim2)}
.sb-cum-item span{color:var(--gold);font-weight:700;font-size:.85rem}

/* ─── COURT ─── */
.court-wrap{padding:0 1rem 1rem;display:flex;justify-content:center}
.court{position:relative;width:100%;max-width:900px;aspect-ratio:2/1;background:linear-gradient(135deg,var(--court) 0%,var(--court-dark) 100%);border-radius:8px;overflow:hidden;border:2px solid rgba(255,255,255,.1)}
/* Court markings */
.court::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:2px;height:100%;background:var(--court-line)}
.court::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100px;height:100px;border:2px solid var(--court-line);border-radius:50%}
.court-paint{position:absolute;top:10%;height:80%;width:18%;border:2px solid var(--court-line);border-radius:0}
.court-paint.left{left:0;border-left:none}
.court-paint.right{right:0;border-right:none}
.court-arc{position:absolute;top:15%;height:70%;width:28%;border:2px solid var(--court-line);border-radius:50%}
.court-arc.left{left:-10%}
.court-arc.right{right:-10%}
.court-hoop{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;border:3px solid #fff;border-radius:50%;z-index:2}
.court-hoop.left{left:6%}
.court-hoop.right{right:6%}
.court-backboard{position:absolute;top:35%;height:30%;width:4px;background:#fff;z-index:2}
.court-backboard.left{left:5.5%}
.court-backboard.right{right:5.5%}

/* Court players */
.court-player{position:absolute;display:flex;flex-direction:column;align-items:center;gap:2px;transform:translate(-50%,-50%);z-index:5;transition:all .4s}
.court-player img{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.3);transition:all .3s;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.court-player.red img{border-color:var(--red)}
.court-player.blue img{border-color:var(--blue)}
.court-player .cp-name{font-family:var(--sub);font-size:.6rem;font-weight:700;letter-spacing:.05em;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8);white-space:nowrap;background:rgba(0,0,0,.5);padding:1px 5px;border-radius:3px}
.court-player.scoring img{transform:scale(1.3);box-shadow:0 0 25px var(--gold);border-color:var(--gold)!important}
.court-player.scoring .cp-name{color:var(--gold)}

/* Ball animation */
.ball{position:absolute;width:20px;height:20px;background:radial-gradient(circle at 35% 35%,#f59e42,#e67e22,#d35400);border-radius:50%;z-index:10;pointer-events:none;opacity:0;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.ball::after{content:'';position:absolute;top:4px;left:3px;width:14px;height:12px;border:1.5px solid rgba(0,0,0,.25);border-radius:50%;border-top-color:transparent;border-left-color:transparent;transform:rotate(-30deg)}

/* Score popup */
.score-pop{position:absolute;font-family:var(--head);font-size:1.5rem;color:var(--gold);z-index:20;pointer-events:none;text-shadow:0 0 10px rgba(255,215,0,.6);opacity:0}

/* ─── STATS TABLE ─── */
.stats-section{max-width:900px;margin:0 auto;padding:0 1rem 2rem}
.stats-header{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
.stats-title{font-family:var(--head);font-size:1.3rem;letter-spacing:.12em;color:var(--lime)}
.stats-table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.stats-table th{font-family:var(--sub);font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);padding:.6rem .75rem;text-align:left;background:var(--surface2);border-bottom:1px solid var(--border)}
.stats-table th.num{text-align:center}
.stats-table td{font-family:var(--sub);font-size:.85rem;padding:.5rem .75rem;border-bottom:1px solid rgba(255,255,255,.03)}
.stats-table td.num{text-align:center;font-family:var(--head);font-size:1rem}
.stats-table tr:last-child td{border-bottom:none}
.stats-table tr.red-row td:first-child{border-left:3px solid var(--red)}
.stats-table tr.blue-row td:first-child{border-left:3px solid var(--blue)}
.stats-table .rep-cell{display:flex;align-items:center;gap:.5rem}
.stats-table .rep-cell img{width:28px;height:28px;border-radius:50%;object-fit:cover}
.stats-table .pts{color:var(--gold);font-weight:700}
.stats-table .team-total td{background:rgba(255,255,255,.03);font-weight:700}
.stats-table .team-total .pts{font-size:1.1rem}

/* ─── POINT VALUES ─── */
.points-bar{display:flex;justify-content:center;gap:1.5rem;padding:.5rem 1rem;flex-wrap:wrap}
.pt-chip{font-family:var(--sub);font-size:.75rem;letter-spacing:.1em;color:var(--dim);background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:.25rem .6rem}
.pt-chip span{color:var(--lime);font-weight:700}

/* ─── LIVE INDICATOR ─── */
.live-bar{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.5rem}
.live-dot{width:8px;height:8px;background:#2ecc71;border-radius:50%;animation:pulse-dot 2s infinite}
.live-text{font-family:var(--sub);font-size:.7rem;letter-spacing:.15em;color:var(--dim);text-transform:uppercase}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}

/* ─── SOUND TOGGLE ─── */
.sound-toggle{position:fixed;top:1rem;right:1rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.4rem .7rem;font-family:var(--sub);font-size:.75rem;letter-spacing:.1em;color:var(--dim);cursor:pointer;z-index:100;transition:all .15s}
.sound-toggle:hover{border-color:var(--lime);color:var(--lime)}
.sound-toggle.on{border-color:var(--lime);color:var(--lime)}

/* ─── BRACKET LINK ─── */
.bracket-link{display:flex;justify-content:center;padding:0 1rem 2rem}
.bracket-link a{font-family:var(--sub);font-size:.8rem;letter-spacing:.1em;color:var(--cyan);text-decoration:none;border:1px solid var(--border);border-radius:4px;padding:.4rem 1rem;transition:all .15s}
.bracket-link a:hover{border-color:var(--cyan);background:rgba(0,212,255,.05)}

/* ─── CONFETTI ─── */
.confetti-piece{position:fixed;width:8px;height:8px;z-index:1000;pointer-events:none;opacity:0}

/* ─── RESPONSIVE ─── */
@media(max-width:700px){
  .scoreboard{gap:.75rem;padding:1rem .5rem .25rem}
  .sb-team-name{font-size:1.2rem}
  .sb-score{font-size:2.5rem}
  .sb-vs{font-size:1rem}
  .court-player img{width:36px;height:36px}
  .court-player .cp-name{font-size:.5rem}
  .court-hoop{width:20px;height:20px}
  .stats-table{font-size:.75rem}
}
@media(max-width:500px){
  .court-player img{width:28px;height:28px}
  .court-player .cp-name{display:none}
  .sb-score{font-size:2rem}
}
</style>
</head>
<body>

<!-- Sound toggle -->
<button class="sound-toggle" id="sound-toggle" onclick="toggleSound()">SOUND: OFF</button>

<!-- Banner -->
<div class="banner">
  <img src="banner.png" alt="Rankings Madness">
  <div class="banner-overlay"></div>
</div>

<!-- Scoreboard -->
<div class="scoreboard">
  <div class="sb-team">
    <div class="sb-team-name red">TEAM RED</div>
    <div class="sb-score red" id="score-red">0</div>
  </div>
  <div class="sb-vs">VS</div>
  <div class="sb-team">
    <div class="sb-team-name blue">TEAM BLUE</div>
    <div class="sb-score blue" id="score-blue">0</div>
  </div>
</div>
<div class="sb-week" id="week-label">WEEK 1</div>
<div class="sb-cumulative" id="cumulative">
  <div class="sb-cum-item">CUMULATIVE: RED <span id="cum-red">0</span></div>
  <div class="sb-cum-item">BLUE <span id="cum-blue">0</span></div>
</div>

<!-- Point values -->
<div class="points-bar">
  <div class="pt-chip">SETS: <span>3 PTS</span></div>
  <div class="pt-chip">HOLDS: <span>5 PTS</span></div>
  <div class="pt-chip">DEALS: <span>10 PTS</span></div>
</div>

<!-- Basketball Court -->
<div class="court-wrap">
  <div class="court" id="court">
    <div class="court-paint left"></div>
    <div class="court-paint right"></div>
    <div class="court-arc left"></div>
    <div class="court-arc right"></div>
    <div class="court-hoop left" id="hoop-left"></div>
    <div class="court-hoop right" id="hoop-right"></div>
    <div class="court-backboard left"></div>
    <div class="court-backboard right"></div>
    <!-- Players injected by JS -->
  </div>
</div>

<!-- Live indicator -->
<div class="live-bar">
  <div class="live-dot"></div>
  <span class="live-text" id="live-text">LIVE — Auto-updating every 60s</span>
</div>

<!-- Stats Table -->
<div class="stats-section">
  <div class="stats-header">
    <div class="stats-title">PLAYER STATS</div>
  </div>
  <table class="stats-table" id="stats-table">
    <thead>
      <tr>
        <th>Player</th>
        <th class="num">Sets</th>
        <th class="num">Holds</th>
        <th class="num">Deals</th>
        <th class="num">Points</th>
      </tr>
    </thead>
    <tbody id="stats-body"></tbody>
  </table>
</div>

<!-- Bracket link -->
<div class="bracket-link">
  <a href="https://scotttheamazing311.github.io/rep-brackets/">View Rep Brackets Challenge &rarr;</a>
</div>

<script>
/* ════════════════════════════════════════
   CONFIG
   ════════════════════════════════════════ */
const CDN = 'https://res.cloudinary.com/dsethujks/image/upload/rankings-tools/headshots';
const SHEET_ID = '1UpOrmYL08bYRqaJxKoSN25AAEwJjEHgQP8QTIBc1F8Q';
const SHEET_GID = '405857624';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${SHEET_GID}`;
const POLL_INTERVAL = 60000; // 60 seconds

const PTS = { sets: 3, holds: 5, deals: 10 };

// Map CSV names to full names + headshots
const REP_MAP = {
  'Andrew':       { full:'Andrew Rockstroh', img:`${CDN}/Andrew.png` },
  'Michael W':    { full:'Michael Wynkoop',  img:`${CDN}/MichaelW.png` },
  'Dave':         { full:'Dave Konkol',      img:`${CDN}/Dave.png` },
  'Matt':         { full:'Matt Delaune',     img:`${CDN}/Matt.png` },
  'Bryan':        { full:'Bryan Fletcher',   img:`${CDN}/Bryan.png` },
  'Megan Herron': { full:'Megan Herron',     img:`${CDN}/MeganH.png` },
  'Ryan David':   { full:'Ryan David',       img:`${CDN}/Ryan.png` },
  'Sydney':       { full:'Sydney Darrow',    img:`${CDN}/Sydney.png` },
  'Tyler D':      { full:'Tyler Duprey',     img:`${CDN}/Tyler.png` },
  'Michael H':    { full:'Michael Helton',   img:`${CDN}/MichaelH.png` },
};

// Court positions (% from left, % from top) — basketball formation
const POSITIONS = {
  red: [
    { left: 20, top: 50 },  // center
    { left: 15, top: 25 },  // forward
    { left: 15, top: 75 },  // forward
    { left: 30, top: 30 },  // guard
    { left: 30, top: 70 },  // guard
  ],
  blue: [
    { left: 80, top: 50 },
    { left: 85, top: 25 },
    { left: 85, top: 75 },
    { left: 70, top: 30 },
    { left: 70, top: 70 },
  ],
};

/* ════════════════════════════════════════
   STATE
   ════════════════════════════════════════ */
let prevData = null;
let soundEnabled = false;
let audioCtx = null;
let animQueue = [];
let animating = false;

/* ════════════════════════════════════════
   COURT SETUP
   ════════════════════════════════════════ */
function buildCourt() {
  const court = document.getElementById('court');
  const teams = { red: [], blue: [] };

  Object.entries(REP_MAP).forEach(([csvName, info]) => {
    // Determine team from default roster
    const redNames = ['Andrew','Michael W','Dave','Matt','Bryan'];
    const team = redNames.includes(csvName.trim()) ? 'red' : 'blue';
    teams[team].push({ csvName, ...info });
  });

  ['red','blue'].forEach(team => {
    teams[team].forEach((rep, i) => {
      const pos = POSITIONS[team][i];
      const div = document.createElement('div');
      div.className = `court-player ${team}`;
      div.id = `cp-${rep.csvName.replace(/\s/g,'-')}`;
      div.style.left = pos.left + '%';
      div.style.top = pos.top + '%';
      div.innerHTML = `<img src="${rep.img}" alt="${rep.full}" onerror="this.style.display='none'"><span class="cp-name">${rep.csvName}</span>`;
      court.appendChild(div);
    });
  });
}

/* ════════════════════════════════════════
   DATA FETCHING
   ════════════════════════════════════════ */
function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim().toLowerCase());
  return lines.slice(1).map(line => {
    const vals = [];
    let inQuote = false, cur = '';
    for (const ch of line) {
      if (ch === '"') { inQuote = !inQuote; continue; }
      if (ch === ',' && !inQuote) { vals.push(cur.trim()); cur = ''; continue; }
      cur += ch;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}

async function fetchScores() {
  try {
    const res = await fetch(SHEET_URL + '&_t=' + Date.now());
    const csv = await res.text();
    const data = parseCSV(csv);
    processData(data);
    document.getElementById('live-text').textContent = `LIVE — Last updated ${new Date().toLocaleTimeString()}`;
  } catch(e) {
    console.warn('Fetch failed:', e);
    document.getElementById('live-text').textContent = 'OFFLINE — Retrying...';
  }
}

function processData(data) {
  // Normalize and compute points
  const rows = data.map(row => {
    const rep = row.rep || '';
    const team = (row.team || '').toLowerCase().trim();
    const sets = parseInt(row.sets) || 0;
    const holds = parseInt(row.holds) || 0;
    const deals = parseInt(row.deals) || 0;
    const pts = sets * PTS.sets + holds * PTS.holds + deals * PTS.deals;
    return { rep, team, sets, holds, deals, pts };
  });

  // Detect changes and queue animations
  if (prevData) {
    rows.forEach(row => {
      const prev = prevData.find(p => p.rep === row.rep);
      if (!prev) return;
      const diff = row.pts - prev.pts;
      if (diff > 0) {
        animQueue.push({ rep: row.rep, team: row.team, diff });
      }
    });
    if (animQueue.length > 0 && !animating) runAnimQueue();
  }

  prevData = rows;
  renderScoreboard(rows);
  renderStats(rows);
}

/* ════════════════════════════════════════
   RENDER
   ════════════════════════════════════════ */
function renderScoreboard(rows) {
  let redTotal = 0, blueTotal = 0;
  rows.forEach(r => {
    if (r.team === 'red') redTotal += r.pts;
    else if (r.team === 'blue') blueTotal += r.pts;
  });
  document.getElementById('score-red').textContent = redTotal;
  document.getElementById('score-blue').textContent = blueTotal;
}

function renderStats(rows) {
  const tbody = document.getElementById('stats-body');
  // Sort: red first, then blue, highest points first within team
  const red = rows.filter(r => r.team === 'red').sort((a,b) => b.pts - a.pts);
  const blue = rows.filter(r => r.team === 'blue').sort((a,b) => b.pts - a.pts);

  const redTotal = red.reduce((s,r) => s + r.pts, 0);
  const blueTotal = blue.reduce((s,r) => s + r.pts, 0);

  let html = '';

  // Red team
  red.forEach(r => {
    const info = REP_MAP[r.rep.trim()] || { full: r.rep, img: '' };
    html += `<tr class="red-row">
      <td><div class="rep-cell"><img src="${info.img}" alt="${info.full}" onerror="this.style.display='none'"> ${info.full}</div></td>
      <td class="num">${r.sets}</td><td class="num">${r.holds}</td><td class="num">${r.deals}</td>
      <td class="num pts">${r.pts}</td></tr>`;
  });
  html += `<tr class="team-total red-row"><td style="border-left:3px solid var(--red);font-family:var(--head);letter-spacing:.1em;color:var(--red)">TEAM RED TOTAL</td>
    <td class="num">${red.reduce((s,r)=>s+r.sets,0)}</td><td class="num">${red.reduce((s,r)=>s+r.holds,0)}</td><td class="num">${red.reduce((s,r)=>s+r.deals,0)}</td>
    <td class="num pts">${redTotal}</td></tr>`;

  // Spacer
  html += `<tr><td colspan="5" style="height:8px;background:var(--bg);border:none"></td></tr>`;

  // Blue team
  blue.forEach(r => {
    const info = REP_MAP[r.rep.trim()] || { full: r.rep, img: '' };
    html += `<tr class="blue-row">
      <td><div class="rep-cell"><img src="${info.img}" alt="${info.full}" onerror="this.style.display='none'"> ${info.full}</div></td>
      <td class="num">${r.sets}</td><td class="num">${r.holds}</td><td class="num">${r.deals}</td>
      <td class="num pts">${r.pts}</td></tr>`;
  });
  html += `<tr class="team-total blue-row"><td style="border-left:3px solid var(--blue);font-family:var(--head);letter-spacing:.1em;color:var(--blue)">TEAM BLUE TOTAL</td>
    <td class="num">${blue.reduce((s,r)=>s+r.sets,0)}</td><td class="num">${blue.reduce((s,r)=>s+r.holds,0)}</td><td class="num">${blue.reduce((s,r)=>s+r.deals,0)}</td>
    <td class="num pts">${blueTotal}</td></tr>`;

  tbody.innerHTML = html;
}

/* ════════════════════════════════════════
   ANIMATIONS
   ════════════════════════════════════════ */
async function runAnimQueue() {
  animating = true;
  while (animQueue.length > 0) {
    const item = animQueue.shift();
    await playScoreAnim(item);
    await sleep(800);
  }
  animating = false;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function playScoreAnim({ rep, team, diff }) {
  const court = document.getElementById('court');
  const playerId = `cp-${rep.replace(/\s/g,'-')}`;
  const playerEl = document.getElementById(playerId);
  if (!playerEl) return;

  // 1. Player glow
  playerEl.classList.add('scoring');

  // 2. Ball animation
  const ball = document.createElement('div');
  ball.className = 'ball';
  court.appendChild(ball);

  const courtRect = court.getBoundingClientRect();
  const playerRect = playerEl.getBoundingClientRect();
  const startX = ((playerRect.left + playerRect.width/2) - courtRect.left) / courtRect.width * 100;
  const startY = ((playerRect.top + playerRect.height/2) - courtRect.top) / courtRect.height * 100;

  // Target: the team's OFFENSIVE hoop (red shoots right, blue shoots left)
  const hoopX = team === 'red' ? 93 : 7;
  const hoopY = 50;

  // Arc animation
  ball.style.left = startX + '%';
  ball.style.top = startY + '%';
  ball.style.opacity = '1';

  const duration = 700;
  const startTime = performance.now();

  await new Promise(resolve => {
    function animate(now) {
      const t = Math.min((now - startTime) / duration, 1);
      const x = startX + (hoopX - startX) * t;
      const arcHeight = -30 * Math.sin(Math.PI * t);
      const y = startY + (hoopY - startY) * t + arcHeight;
      ball.style.left = x + '%';
      ball.style.top = y + '%';
      if (t < 1) { requestAnimationFrame(animate); }
      else { resolve(); }
    }
    requestAnimationFrame(animate);
  });

  // 3. Score popup
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = `+${diff}`;
  pop.style.left = hoopX + '%';
  pop.style.top = (hoopY - 10) + '%';
  court.appendChild(pop);

  // Animate popup
  pop.style.opacity = '1';
  pop.style.transition = 'all .6s ease-out';
  requestAnimationFrame(() => {
    pop.style.top = (hoopY - 25) + '%';
    pop.style.opacity = '0';
  });

  // 4. Flash scoreboard
  const scoreEl = document.getElementById(`score-${team}`);
  scoreEl.classList.add('flash');

  // 5. Sound
  if (soundEnabled) playSwish();

  // 6. Mini confetti
  spawnConfetti(team);

  // Cleanup
  ball.style.opacity = '0';
  await sleep(600);
  playerEl.classList.remove('scoring');
  scoreEl.classList.remove('flash');
  try { court.removeChild(ball); } catch(e) {}
  try { court.removeChild(pop); } catch(e) {}
}

/* ════════════════════════════════════════
   SOUND
   ════════════════════════════════════════ */
function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('sound-toggle');
  btn.textContent = soundEnabled ? 'SOUND: ON' : 'SOUND: OFF';
  btn.classList.toggle('on', soundEnabled);
  if (soundEnabled && !audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playSwish() {
  if (!audioCtx) return;
  // Net swish sound — white noise burst with bandpass
  const duration = 0.25;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
  }
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;

  const bandpass = audioCtx.createBiquadFilter();
  bandpass.type = 'bandpass';
  bandpass.frequency.value = 3000;
  bandpass.Q.value = 1.5;

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

  source.connect(bandpass);
  bandpass.connect(gain);
  gain.connect(audioCtx.destination);
  source.start();
}

/* ════════════════════════════════════════
   CONFETTI
   ════════════════════════════════════════ */
function spawnConfetti(team) {
  const colors = team === 'red'
    ? ['#e74c3c','#ff6b6b','#c0392b','#ffd700','#ff8c00']
    : ['#3498db','#5dade2','#2980b9','#ffd700','#00d4ff'];

  for (let i = 0; i < 20; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const size = 4 + Math.random() * 8;
    const startX = 30 + Math.random() * 40; // center-ish
    const startY = 20 + Math.random() * 20;
    const angle = Math.random() * 360;
    const drift = (Math.random() - 0.5) * 200;

    piece.style.cssText = `
      left:${startX}vw;top:${startY}vh;
      width:${size}px;height:${size * 0.6}px;
      background:${color};
      border-radius:${Math.random() > 0.5 ? '50%' : '1px'};
      opacity:1;
      transform:rotate(${angle}deg);
      transition:all ${0.8 + Math.random() * 0.8}s cubic-bezier(.25,.46,.45,.94);
    `;
    document.body.appendChild(piece);

    requestAnimationFrame(() => {
      piece.style.top = (startY + 40 + Math.random() * 30) + 'vh';
      piece.style.left = (startX + drift / 10) + 'vw';
      piece.style.opacity = '0';
      piece.style.transform = `rotate(${angle + 360 + Math.random() * 360}deg)`;
    });

    setTimeout(() => { try { document.body.removeChild(piece); } catch(e) {} }, 2000);
  }
}

/* ════════════════════════════════════════
   INIT
   ════════════════════════════════════════ */
buildCourt();
fetchScores();
setInterval(fetchScores, POLL_INTERVAL);
</script>
