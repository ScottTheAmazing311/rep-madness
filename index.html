<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rep Madness — Rankings.io</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060e;--surface:#0d0d1a;--surface2:#12122a;--border:#1a1a36;
  --lime:#c8ff00;--cyan:#00d4ff;--magenta:#ff2d78;--gold:#ffd700;--orange:#ff8c00;
  --text:#e8e8f0;--dim:#5a5a7a;--dim2:#3a3a5a;
  --head:'Bebas Neue',sans-serif;
  --sub:'Barlow Condensed',sans-serif;
  --body:'DM Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--body)}

/* ─── GATE ─── */
#gate{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-y:auto;padding:2rem}
#gate.hidden{display:none}
.gate-title{font-family:var(--head);font-size:clamp(3rem,8vw,5rem);color:var(--lime);letter-spacing:.08em;line-height:1;text-shadow:0 0 60px rgba(200,255,0,.3)}
.gate-sub{font-family:var(--sub);font-size:1.1rem;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);margin:.5rem 0 2rem}
.gate-label{font-family:var(--sub);font-size:.85rem;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:.75rem}
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem;max-width:700px;width:100%;margin-bottom:1.5rem}
.player-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.75rem;text-align:center;cursor:pointer;transition:all .2s}
.player-card:hover{border-color:var(--lime);background:rgba(200,255,0,.05);transform:translateY(-2px)}
.player-card.selected{border-color:var(--lime);background:rgba(200,255,0,.1);box-shadow:0 0 20px rgba(200,255,0,.15)}
.player-card img{width:64px;height:64px;border-radius:50%;object-fit:cover;margin-bottom:.5rem;border:2px solid var(--border);transition:border-color .2s}
.player-card.selected img{border-color:var(--lime)}
.player-card .name{font-family:var(--sub);font-size:.9rem;font-weight:700;letter-spacing:.05em}
.player-card .title{font-size:.65rem;color:var(--dim);margin-top:.15rem}
.gate-enter{background:var(--lime);border:none;border-radius:6px;padding:.9rem 3rem;font-family:var(--head);font-size:1.6rem;letter-spacing:.15em;color:#000;cursor:pointer;transition:all .2s;margin-top:.5rem}
.gate-enter:hover{box-shadow:0 0 30px rgba(200,255,0,.4);transform:scale(1.03)}
.gate-enter:disabled{opacity:.3;pointer-events:none}
.gate-admin{background:none;border:none;color:var(--dim);font-family:var(--sub);font-size:.75rem;letter-spacing:.1em;cursor:pointer;margin-top:1rem;text-decoration:underline}
.admin-input{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:4px;padding:.5rem 1rem;font-family:var(--body);font-size:.85rem;color:var(--text);text-align:center;width:200px;outline:none;margin-top:.5rem}
.admin-input:focus{border-color:var(--magenta)}

/* ─── APP LAYOUT ─── */
#app{display:none;height:100vh;flex-direction:column;overflow:hidden}
#app.visible{display:flex}

/* ─── TOPBAR ─── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.25rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:1rem}
.topbar-logo{font-family:var(--head);font-size:1.4rem;letter-spacing:.1em;color:var(--lime)}
.topbar-player{display:flex;align-items:center;gap:.5rem}
.topbar-player img{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid var(--lime)}
.topbar-player .name{font-family:var(--sub);font-size:.85rem;font-weight:700;letter-spacing:.05em}
.topbar-right{display:flex;align-items:center;gap:1rem}
.entries-badge{display:flex;align-items:center;gap:.4rem;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.2);border-radius:4px;padding:.3rem .7rem}
.entries-badge .num{font-family:var(--head);font-size:1.1rem;color:var(--gold)}
.entries-badge .lbl{font-family:var(--sub);font-size:.7rem;letter-spacing:.1em;color:var(--dim);text-transform:uppercase}
.topbar-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:.3rem .7rem;font-family:var(--sub);font-size:.75rem;letter-spacing:.1em;color:var(--dim);cursor:pointer;transition:all .15s}
.topbar-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.topbar-btn.active{border-color:var(--magenta);color:var(--magenta)}

/* ─── TABS ─── */
.tab-bar{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.tab{flex:1;text-align:center;padding:.6rem .5rem;font-family:var(--head);font-size:1rem;letter-spacing:.12em;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;min-width:80px}
.tab:hover{color:var(--text);background:rgba(255,255,255,.02)}
.tab.active{color:var(--lime);border-bottom-color:var(--lime);background:rgba(200,255,0,.03)}
.tab.ff{color:var(--gold)}
.tab.ff.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ─── BRACKET AREA ─── */
.bracket-wrap{flex:1;overflow:auto;padding:1rem;display:flex;justify-content:center}
.bracket-region{display:flex;gap:8px;align-items:stretch;min-height:600px;padding-bottom:1rem}
.round{display:flex;flex-direction:column;justify-content:space-around;min-width:150px;gap:0}
.round-label{font-family:var(--head);font-size:.7rem;letter-spacing:.2em;color:var(--dim2);text-align:center;padding-bottom:.5rem;text-transform:uppercase;flex-shrink:0}

/* ─── MATCHUP ─── */
.matchup{display:flex;flex-direction:column;position:relative}
.matchup-seed-pair{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:4px;overflow:hidden;background:var(--surface)}
.team-slot{display:flex;align-items:center;gap:.4rem;padding:.35rem .6rem;cursor:pointer;transition:all .12s;min-height:32px;position:relative}
.team-slot:first-child{border-bottom:1px solid var(--border)}
.team-slot:hover{background:rgba(200,255,0,.06)}
.team-slot.picked{background:rgba(200,255,0,.12)}
.team-slot.picked .team-name{color:var(--lime)}
.team-slot.correct{background:rgba(0,212,255,.1)}
.team-slot.correct .team-name{color:var(--cyan)}
.team-slot.wrong{opacity:.35}
.team-slot.empty{cursor:default;opacity:.3}
.team-slot.empty:hover{background:transparent}
.seed{font-family:var(--head);font-size:.7rem;color:var(--dim);width:18px;text-align:center;flex-shrink:0}
.team-name{font-family:var(--sub);font-size:.8rem;font-weight:600;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Connector lines */
.round:not(:last-child) .matchup{padding-right:8px}
.round:not(:last-child) .matchup::after{content:'';position:absolute;right:0;top:25%;height:50%;width:8px;border:1px solid var(--border);border-left:none;border-radius:0 3px 3px 0}

/* ─── FINAL FOUR ─── */
.ff-wrap{display:flex;flex-direction:column;align-items:center;gap:2rem;padding:2rem}
.ff-semis{display:flex;gap:4rem;align-items:center}
.ff-matchup{display:flex;flex-direction:column;align-items:center;gap:.5rem}
.ff-matchup .matchup-seed-pair{min-width:180px}
.ff-label{font-family:var(--head);font-size:.8rem;letter-spacing:.2em;color:var(--dim)}
.ff-champ{display:flex;flex-direction:column;align-items:center;gap:.5rem;margin-top:1rem}
.ff-champ .matchup-seed-pair{min-width:200px;border-color:var(--gold)}
.champ-trophy{font-size:2.5rem;line-height:1}
.champ-label{font-family:var(--head);font-size:1.2rem;letter-spacing:.2em;color:var(--gold)}

/* ─── ENTRY SELECTOR ─── */
.entry-bar{display:flex;align-items:center;justify-content:center;gap:.75rem;padding:.5rem 1rem;background:rgba(200,255,0,.03);border-bottom:1px solid var(--border);flex-shrink:0}
.entry-bar .lbl{font-family:var(--sub);font-size:.8rem;letter-spacing:.1em;color:var(--dim);text-transform:uppercase}
.entry-select{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:.3rem .6rem;font-family:var(--sub);font-size:.85rem;color:var(--text);cursor:pointer;outline:none}
.entry-select:focus{border-color:var(--lime)}
.new-entry-btn{background:var(--lime);border:none;border-radius:4px;padding:.3rem .8rem;font-family:var(--head);font-size:.8rem;letter-spacing:.1em;color:#000;cursor:pointer;transition:opacity .15s}
.new-entry-btn:hover{opacity:.85}
.new-entry-btn:disabled{opacity:.3;pointer-events:none}
.submit-btn{background:var(--cyan);border:none;border-radius:4px;padding:.3rem .8rem;font-family:var(--head);font-size:.8rem;letter-spacing:.1em;color:#000;cursor:pointer}
.submit-btn:hover{opacity:.85}
.entry-status{font-family:var(--sub);font-size:.75rem;color:var(--dim);letter-spacing:.05em}

/* ─── ADMIN PANEL ─── */
#admin-panel{display:none;position:fixed;inset:0;z-index:500;background:rgba(6,6,14,.92);align-items:center;justify-content:center;padding:1rem}
#admin-panel.open{display:flex}
.admin-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:2rem;width:min(600px,95vw);max-height:85vh;overflow-y:auto}
.admin-box h2{font-family:var(--head);font-size:1.8rem;letter-spacing:.1em;color:var(--magenta);margin-bottom:1rem}
.admin-section{margin-bottom:1.5rem}
.admin-section h3{font-family:var(--head);font-size:1rem;letter-spacing:.15em;color:var(--lime);margin-bottom:.5rem}
.admin-row{display:flex;align-items:center;gap:.5rem;padding:.4rem 0;border-bottom:1px solid rgba(255,255,255,.04)}
.admin-row .player-name{flex:1;font-family:var(--sub);font-size:.9rem;font-weight:600}
.admin-row .entry-count{font-family:var(--head);font-size:1rem;color:var(--gold);width:30px;text-align:center}
.admin-input-sm{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:3px;padding:.3rem .5rem;width:60px;font-family:var(--body);font-size:.8rem;color:var(--text);text-align:center;outline:none}
.admin-input-sm:focus{border-color:var(--lime)}
.admin-btn{background:var(--lime);border:none;border-radius:3px;padding:.3rem .7rem;font-family:var(--head);font-size:.75rem;letter-spacing:.1em;color:#000;cursor:pointer}
.admin-btn.danger{background:var(--magenta);color:#fff}
.admin-close{background:none;border:1px solid var(--border);border-radius:4px;padding:.4rem 1.2rem;font-family:var(--sub);font-size:.85rem;color:var(--dim);cursor:pointer;margin-top:.5rem}
.admin-msg{font-size:.75rem;color:var(--lime);font-family:var(--sub);min-height:1rem;margin-top:.25rem}

/* ─── LEADERBOARD PANEL ─── */
#lb-panel{display:none;position:fixed;inset:0;z-index:500;background:rgba(6,6,14,.92);align-items:center;justify-content:center;padding:1rem}
#lb-panel.open{display:flex}
.lb-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:2rem;width:min(500px,95vw);max-height:85vh;overflow-y:auto}
.lb-box h2{font-family:var(--head);font-size:1.8rem;letter-spacing:.1em;color:var(--gold);margin-bottom:1rem}
.lb-row{display:flex;align-items:center;gap:.75rem;padding:.6rem .5rem;border-bottom:1px solid rgba(255,255,255,.04)}
.lb-rank{font-family:var(--head);font-size:1.2rem;color:var(--dim);width:28px;text-align:center}
.lb-rank.gold{color:var(--gold)}
.lb-rank.silver{color:#c0c0c0}
.lb-rank.bronze{color:#cd7f32}
.lb-player-img{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid var(--border)}
.lb-name{flex:1;font-family:var(--sub);font-size:.9rem;font-weight:700}
.lb-entries{font-family:var(--sub);font-size:.75rem;color:var(--dim)}
.lb-score{font-family:var(--head);font-size:1.2rem;color:var(--lime)}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--lime);border-radius:6px;padding:.6rem 1.5rem;font-family:var(--sub);font-size:.9rem;letter-spacing:.05em;color:var(--lime);z-index:900;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:700px){
  .player-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
  .round{min-width:120px}
  .ff-semis{flex-direction:column;gap:1.5rem}
  .topbar{flex-wrap:wrap;gap:.5rem}
}
</style>
</head>

      <button class="topbar-btn" onclick="logout()">Logout</button>

  </div>

    </div>
    <button class="admin-close" onclick="closeAdmin()">Close</button>

</div>

let currentBracket = null;
let allPlayerData = [];  // for admin/leaderboard
let allBracketsAll = []; // all brackets for all players
let dbOk = false;        // whether Supabase tables exist

/* ════════════════════════════════════════
   LOCAL STORAGE HELPERS
   ════════════════════════════════════════ */
const LS_PREFIX = 'rm_';
function lsGet(key) { try { return JSON.parse(localStorage.getItem(LS_PREFIX + key)); } catch { return null; } }
function lsSet(key, val) { localStorage.setItem(LS_PREFIX + key, JSON.stringify(val)); }

function lsGetPlayers() { return lsGet('players') || {}; }
function lsSetPlayer(name, data) { const all = lsGetPlayers(); all[name] = data; lsSet('players', all); }
function lsGetBrackets() { return lsGet('brackets') || []; }
function lsSetBrackets(brackets) { lsSet('brackets', brackets); }

async function checkDb() {
  try {
    const { error } = await sb.from('rm_players').select('id').limit(1);
    if (error) { console.warn('DB not ready:', error.message); return false; }
    return true;
  } catch { return false; }
}

/* ════════════════════════════════════════
   GATE
   ════════════════════════════════════════ */
function renderGate() {
  const grid = document.getElementById('player-grid');
  grid.innerHTML = '';
  PLAYERS.forEach(p => {
    const div = document.createElement('div');
    div.className = 'player-card';
    div.innerHTML = `<img src="${p.img}" alt="${p.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect fill=%22%230d0d1a%22 width=%2264%22 height=%2264%22/><text x=%2232%22 y=%2238%22 text-anchor=%22middle%22 fill=%22%235a5a7a%22 font-size=%2220%22>${p.name[0]}</text></svg>'">
      <div class="name">${p.name}</div>
      <div class="title">${p.title}</div>`;
    div.onclick = () => {
      document.querySelectorAll('.player-card').forEach(c => c.classList.remove('selected'));
      div.classList.add('selected');
      currentPlayer = p;
      document.getElementById('gate-enter').disabled = false;
    };
    grid.appendChild(div);
  });
}

function toggleAdminLogin() {
  const el = document.getElementById('gate-admin-pw');
  const isHidden = el.style.display === 'none' || el.style.display === '' || !el.style.display;
  el.style.display = isHidden ? 'block' : 'none';
  if (isHidden) { el.value = ''; el.focus(); }
  document.getElementById('gate-admin-msg').textContent = '';
}

function checkAdminPw() {
  const pw = document.getElementById('gate-admin-pw').value.trim();
  const msgEl = document.getElementById('gate-admin-msg');
  if (pw === ADMIN_PASS) {
    isAdmin = true;
    document.getElementById('gate-admin-pw').style.display = 'none';
    document.getElementById('gate-admin-btn').textContent = '✓ ADMIN MODE';
    document.getElementById('gate-admin-btn').style.color = 'var(--magenta)';
    document.getElementById('gate-admin-btn').style.textDecoration = 'none';
    msgEl.textContent = 'Admin mode enabled — select a player to continue';
    msgEl.style.color = 'var(--magenta)';
  } else {
    msgEl.textContent = 'Wrong password';
    msgEl.style.color = 'var(--magenta)';
    document.getElementById('gate-admin-pw').value = '';
    document.getElementById('gate-admin-pw').focus();
  }
}

async function enterApp() {
  if (!currentPlayer) return;
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  if (isAdmin) document.getElementById('admin-toggle').style.display = '';

  // Set topbar
  document.getElementById('topbar-player').innerHTML = `
    <img src="${currentPlayer.img}" alt="${currentPlayer.name}">
    <span class="name">${currentPlayer.name}</span>`;

  dbOk = await checkDb();
  if (!dbOk && isAdmin) toast('DB tables not found — using local storage. Run setup SQL in Supabase.');

  await ensurePlayer();
  await loadPlayerBrackets();
  renderEntryBar();
  renderBracket();
}

function logout() {
  currentPlayer = null;
  isAdmin = false;
  currentBracket = null;
  allBrackets = [];
  document.getElementById('app').classList.remove('visible');
  document.getElementById('gate').classList.remove('hidden');
  document.querySelectorAll('.player-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('gate-enter').disabled = true;
}

/* ════════════════════════════════════════
   DATA LAYER
   ════════════════════════════════════════ */
async function ensurePlayer() {
  if (dbOk) {
    try {
      const { data } = await sb.from('rm_players').select('*').eq('name', currentPlayer.name).single();
      if (data) { playerData = data; lsSetPlayer(currentPlayer.name, data); return; }
    } catch(e) {}
    try {
      const { data } = await sb.from('rm_players').insert({ name: currentPlayer.name, total_entries: 1 }).select().single();
      if (data) { playerData = data; lsSetPlayer(currentPlayer.name, data); return; }
    } catch(e) {}
  }
  // Fallback to localStorage
  const lsPlayers = lsGetPlayers();
  if (lsPlayers[currentPlayer.name]) {
    playerData = lsPlayers[currentPlayer.name];
  } else {
    playerData = { id: crypto.randomUUID(), name: currentPlayer.name, total_entries: 1 };
    lsSetPlayer(currentPlayer.name, playerData);
  }
}

async function loadPlayerBrackets() {
  if (dbOk) {
    try {
      const { data } = await sb.from('rm_brackets').select('*').eq('player_name', currentPlayer.name).order('entry_number');
      if (data && data.length > 0) {
        allBrackets = data;
        lsSet('brackets_' + currentPlayer.name, data);
      } else {
        allBrackets = [];
      }
    } catch(e) { allBrackets = []; }
  }
  // Fallback or merge with localStorage
  if (allBrackets.length === 0) {
    allBrackets = lsGet('brackets_' + currentPlayer.name) || [];
  }
  if (allBrackets.length > 0) {
    currentBracket = allBrackets[0];
  } else {
    // Auto-create first entry so user can start picking immediately
    await autoCreateFirstEntry();
  }
  updateEntryCount();
}

async function autoCreateFirstEntry() {
  const entryNum = 1;
  const newBracket = {
    id: crypto.randomUUID(),
    player_name: currentPlayer.name,
    entry_number: entryNum,
    picks: {},
    score: 0,
    submitted: false,
    locked: false,
  };
  if (dbOk) {
    try {
      const { data } = await sb.from('rm_brackets').insert(newBracket).select().single();
      if (data) { newBracket.id = data.id; }
    } catch(e) { console.warn('DB insert failed, using local', e); }
  }
  allBrackets = [newBracket];
  currentBracket = newBracket;
  lsSet('brackets_' + currentPlayer.name, allBrackets);
  toast('Bracket #1 created — start picking!');
}

async function loadAllData() {
  if (dbOk) {
    try {
      const [pRes, bRes] = await Promise.all([
        sb.from('rm_players').select('*').order('name'),
        sb.from('rm_brackets').select('*').order('player_name,entry_number'),
      ]);
      allPlayerData = pRes.data || [];
      allBracketsAll = bRes.data || [];
      return;
    } catch(e) {}
  }
  // Fallback to localStorage
  const lsPlayers = lsGetPlayers();
  allPlayerData = Object.values(lsPlayers);
  allBracketsAll = [];
  PLAYERS.forEach(p => {
    const brackets = lsGet('brackets_' + p.name) || [];
    allBracketsAll.push(...brackets);
  });
}

function updateEntryCount() {
  const total = playerData?.total_entries || 1;
  const used = allBrackets.length;
  document.getElementById('entry-count').textContent = `${used}/${total}`;
}

async function createEntry() {
  const total = playerData?.total_entries || 1;
  const used = allBrackets.length;
  if (used >= total) { toast('No entries remaining — earn more through sales metrics!'); return; }
  const entryNum = used + 1;
  const newBracket = {
    id: crypto.randomUUID(),
    player_name: currentPlayer.name,
    entry_number: entryNum,
    picks: {},
    score: 0,
    submitted: false,
    locked: false,
  };
  if (dbOk) {
    try {
      const { data } = await sb.from('rm_brackets').insert(newBracket).select().single();
      if (data) newBracket.id = data.id;
    } catch(e) { console.warn('DB insert failed, using local'); }
  }
  allBrackets.push(newBracket);
  currentBracket = newBracket;
  lsSet('brackets_' + currentPlayer.name, allBrackets);
  renderEntryBar();
  renderBracket();
  toast(`Entry #${entryNum} created`);
  updateEntryCount();
}

async function savePicks() {
  if (!currentBracket) return;
  // Always save to localStorage
  const idx = allBrackets.findIndex(b => b.id === currentBracket.id);
  if (idx >= 0) allBrackets[idx] = currentBracket;
  lsSet('brackets_' + currentPlayer.name, allBrackets);
  // Try DB
  if (dbOk) {
    try {
      await sb.from('rm_brackets').update({ picks: currentBracket.picks }).eq('id', currentBracket.id);
    } catch(e) { console.warn('DB save failed', e); }
  }
}

async function submitEntry() {
  if (!currentBracket) return;
  if (currentBracket.submitted) { toast('Already submitted'); return; }
  const pickCount = Object.keys(currentBracket.picks).length;
  if (pickCount < 63) {
    toast(`Fill out all picks first (${pickCount}/63)`);
    return;
  }
  currentBracket.submitted = true;
  // Save locally
  const idx = allBrackets.findIndex(b => b.id === currentBracket.id);
  if (idx >= 0) allBrackets[idx] = currentBracket;
  lsSet('brackets_' + currentPlayer.name, allBrackets);
  if (dbOk) {
    try {
      await sb.from('rm_brackets').update({ submitted: true }).eq('id', currentBracket.id);
    } catch(e) { console.warn('DB submit failed'); }
  }
  toast('Bracket locked in!');
  renderEntryBar();
  renderBracket();
}

function switchEntry() {
  const sel = document.getElementById('entry-select');
  const idx = parseInt(sel.value);
  currentBracket = allBrackets[idx] || null;
  renderBracket();
  renderEntryBar();
}

/* ════════════════════════════════════════
   ENTRY BAR
   ════════════════════════════════════════ */
function renderEntryBar() {
  const sel = document.getElementById('entry-select');
  sel.innerHTML = '';
  allBrackets.forEach((b, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `Entry #${b.entry_number}${b.submitted ? ' ✓' : ''}`;
    if (currentBracket && currentBracket.id === b.id) opt.selected = true;
    sel.appendChild(opt);
  });

  const total = playerData?.total_entries || 1;
  const used = allBrackets.length;
  document.getElementById('new-entry-btn').disabled = used >= total;

  const status = document.getElementById('entry-status');
  if (!currentBracket) {
    status.textContent = used === 0 ? 'Create your first entry to start' : '';
  } else if (currentBracket.submitted) {
    status.textContent = '✓ Submitted';
    status.style.color = 'var(--cyan)';
  } else {
    const picks = Object.keys(currentBracket.picks || {}).length;
    status.textContent = `${picks}/63 picks`;
    status.style.color = 'var(--dim)';
  }

  document.getElementById('submit-btn').style.display = currentBracket && !currentBracket.submitted ? '' : 'none';
  updateEntryCount();
}

/* ════════════════════════════════════════
   BRACKET LOGIC
   ════════════════════════════════════════ */
function getGameId(region, round, game) {
  return `${region}-r${round}-g${game}`;
}

function getTeamForSlot(region, round, game, slot) {
  // slot: 0=top, 1=bottom
  if (round === 1) {
    const teams = REGIONS[region].teams;
    const idx = game * 2 + slot;
    return teams[idx] ? { seed: teams[idx][0], name: teams[idx][1] } : null;
  }
  // Later rounds: team comes from pick in previous round
  const prevGame = game * 2 + slot;
  const prevId = getGameId(region, round - 1, prevGame);
  const picks = currentBracket?.picks || {};
  if (picks[prevId]) return picks[prevId]; // { seed, name }
  return null;
}

function getFFTeam(ffRound, game, slot) {
  // ffRound 5: Final Four (2 games)
  // ffRound 6: Championship (1 game)
  const picks = currentBracket?.picks || {};
  if (ffRound === 5) {
    // game 0: east winner vs west winner; game 1: south winner vs midwest winner
    const regionPairs = [['east','west'],['south','midwest']];
    const region = regionPairs[game][slot];
    const eliteId = getGameId(region, 4, 0);
    return picks[eliteId] || null;
  }
  if (ffRound === 6) {
    const prevId = `ff-r5-g${slot}`;
    return picks[prevId] || null;
  }
  return null;
}

function makePick(region, round, game, slot) {
  if (!currentBracket || currentBracket.submitted) return;
  let team;
  if (region === 'ff') {
    team = getFFTeam(round, game, slot);
  } else {
    team = getTeamForSlot(region, round, game, slot);
  }
  if (!team) return;

  const gameId = region === 'ff' ? `ff-r${round}-g${game}` : getGameId(region, round, game);
  const picks = currentBracket.picks;

  // If already picked this team, do nothing
  if (picks[gameId] && picks[gameId].name === team.name) return;

  // Set the pick
  picks[gameId] = { seed: team.seed, name: team.name };

  // Cascade clear: if this team was advanced further, remove downstream picks
  cascadeClear(region, round, game, picks);

  savePicks();
  renderBracket();
  renderEntryBar();
}

function cascadeClear(region, round, game, picks) {
  // Clear the next round slot that this game feeds into
  let nextRound, nextGame;
  if (region === 'ff') {
    if (round === 5) { nextRound = 6; nextGame = 0; }
    else return;
    const nextId = `ff-r${nextRound}-g${nextGame}`;
    if (picks[nextId]) {
      delete picks[nextId];
    }
    return;
  }

  if (round < 4) {
    nextRound = round + 1;
    nextGame = Math.floor(game / 2);
    const nextId = getGameId(region, nextRound, nextGame);
    if (picks[nextId]) {
      delete picks[nextId];
      cascadeClear(region, nextRound, nextGame, picks);
    }
  } else if (round === 4) {
    // Elite 8 winner feeds into Final Four
    const regionOrder = ['east','west','south','midwest'];
    const ri = regionOrder.indexOf(region);
    const ffGame = Math.floor(ri / 2);
    const ffId = `ff-r5-g${ffGame}`;
    if (picks[ffId]) {
      delete picks[ffId];
      cascadeClear('ff', 5, ffGame, picks);
    }
  }
}

/* ════════════════════════════════════════
   RENDER BRACKET
   ════════════════════════════════════════ */
function switchRegion(r) {
  currentRegion = r;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.region === r));
  renderBracket();
}

function renderBracket() {
  const wrap = document.getElementById('bracket-wrap');
  if (currentRegion === 'ff') {
    renderFinalFour(wrap);
    return;
  }
  renderRegionBracket(wrap, currentRegion);
}

function renderRegionBracket(wrap, region) {
  const rounds = [
    { round:1, games:8, label:'ROUND OF 64' },
    { round:2, games:4, label:'ROUND OF 32' },
    { round:3, games:2, label:'SWEET 16' },
    { round:4, games:1, label:'ELITE 8' },
  ];

  let html = `<div class="bracket-region">`;
  rounds.forEach(({ round, games, label }) => {
    html += `<div class="round"><div class="round-label">${label}</div>`;
    for (let g = 0; g < games; g++) {
      const top = getTeamForSlot(region, round, g, 0);
      const bot = getTeamForSlot(region, round, g, 1);
      const gameId = getGameId(region, round, g);
      const pick = currentBracket?.picks?.[gameId];
      html += renderMatchup(region, round, g, top, bot, pick);
    }
    html += `</div>`;
  });

  // Region winner
  const eliteId = getGameId(region, 4, 0);
  const winner = currentBracket?.picks?.[eliteId];
  html += `<div class="round" style="justify-content:center">
    <div class="round-label">REGION WINNER</div>
    <div style="text-align:center;padding:1rem">
      <div style="font-family:var(--head);font-size:1.4rem;letter-spacing:.1em;color:${REGIONS[region].color}">${winner ? `(${winner.seed}) ${winner.name}` : '—'}</div>
      <div style="font-family:var(--sub);font-size:.7rem;letter-spacing:.15em;color:var(--dim);margin-top:.25rem">${REGIONS[region].name} CHAMPION</div>
    </div>
  </div>`;

  html += `</div>`;
  wrap.innerHTML = html;
}

function renderMatchup(region, round, game, top, bot, pick) {
  const isSubmitted = currentBracket?.submitted;
  const topPicked = pick && top && pick.name === top.name;
  const botPicked = pick && bot && pick.name === bot.name;

  return `<div class="matchup">
    <div class="matchup-seed-pair">
      <div class="team-slot ${top ? (topPicked ? 'picked' : '') : 'empty'}"
           onclick="${top && !isSubmitted ? `makePick('${region}',${round},${game},0)` : ''}">
        <span class="seed">${top ? top.seed : ''}</span>
        <span class="team-name">${top ? top.name : 'TBD'}</span>
      </div>
      <div class="team-slot ${bot ? (botPicked ? 'picked' : '') : 'empty'}"
           onclick="${bot && !isSubmitted ? `makePick('${region}',${round},${game},1)` : ''}">
        <span class="seed">${bot ? bot.seed : ''}</span>
        <span class="team-name">${bot ? bot.name : 'TBD'}</span>
      </div>
    </div>
  </div>`;
}

function renderFinalFour(wrap) {
  const picks = currentBracket?.picks || {};
  const isSubmitted = currentBracket?.submitted;

  // Semifinal 1: East vs West
  const eastWinner = picks[getGameId('east',4,0)] || null;
  const westWinner = picks[getGameId('west',4,0)] || null;
  const sf1Pick = picks['ff-r5-g0'] || null;

  // Semifinal 2: South vs Midwest
  const southWinner = picks[getGameId('south',4,0)] || null;
  const midwestWinner = picks[getGameId('midwest',4,0)] || null;
  const sf2Pick = picks['ff-r5-g1'] || null;

  // Championship
  const champPick = picks['ff-r6-g0'] || null;

  const renderFFMatchup = (label, top, bot, pick, gameId, round, game) => {
    const topPicked = pick && top && pick.name === top.name;
    const botPicked = pick && bot && pick.name === bot.name;
    return `<div class="ff-matchup">
      <div class="ff-label">${label}</div>
      <div class="matchup-seed-pair">
        <div class="team-slot ${top ? (topPicked ? 'picked' : '') : 'empty'}"
             onclick="${top && !isSubmitted ? `makePick('ff',${round},${game},0)` : ''}">
          <span class="seed">${top ? top.seed : ''}</span>
          <span class="team-name">${top ? top.name : 'TBD'}</span>
        </div>
        <div class="team-slot ${bot ? (botPicked ? 'picked' : '') : 'empty'}"
             onclick="${bot && !isSubmitted ? `makePick('ff',${round},${game},1)` : ''}">
          <span class="seed">${bot ? bot.seed : ''}</span>
          <span class="team-name">${bot ? bot.name : 'TBD'}</span>
        </div>
      </div>
    </div>`;
  };

  wrap.innerHTML = `<div class="ff-wrap">
    <div class="ff-semis">
      ${renderFFMatchup('EAST vs WEST', eastWinner, westWinner, sf1Pick, 'ff-r5-g0', 5, 0)}
      ${renderFFMatchup('SOUTH vs MIDWEST', southWinner, midwestWinner, sf2Pick, 'ff-r5-g1', 5, 1)}
    </div>
    <div class="ff-champ">
      <div class="champ-trophy">🏆</div>
      <div class="champ-label">CHAMPIONSHIP</div>
      ${renderFFMatchup('NATIONAL CHAMPION', sf1Pick, sf2Pick, champPick, 'ff-r6-g0', 6, 0)}
      ${champPick ? `<div style="font-family:var(--head);font-size:2rem;color:var(--gold);margin-top:.5rem;letter-spacing:.1em">(${champPick.seed}) ${champPick.name}</div>` : ''}
    </div>
  </div>`;
}

/* ════════════════════════════════════════
   ADMIN
   ════════════════════════════════════════ */
async function openAdmin() {
  if (!isAdmin) return;
  await loadAllData();
  const list = document.getElementById('admin-entry-list');
  list.innerHTML = '';
  PLAYERS.forEach(p => {
    const pd = allPlayerData.find(d => d.name === p.name);
    const current = pd?.total_entries || 1;
    const brackets = allBracketsAll.filter(b => b.player_name === p.name);
    const div = document.createElement('div');
    div.className = 'admin-row';
    div.innerHTML = `
      <span class="player-name">${p.name}</span>
      <span style="font-size:.7rem;color:var(--dim)">${brackets.length} used</span>
      <span class="entry-count">${current}</span>
      <input class="admin-input-sm" type="number" min="1" value="${current}" id="admin-entries-${p.name.replace(/\s/g,'-')}">
      <button class="admin-btn" onclick="setEntries('${p.name}')">SET</button>`;
    list.appendChild(div);
  });
  document.getElementById('admin-panel').classList.add('open');
  document.getElementById('setup-sql').textContent = SETUP_SQL;
}

async function setEntries(name) {
  const input = document.getElementById(`admin-entries-${name.replace(/\s/g,'-')}`);
  const val = parseInt(input.value);
  if (isNaN(val) || val < 1) return;

  // Always update localStorage
  const lsPlayers = lsGetPlayers();
  const existing = lsPlayers[name] || { id: crypto.randomUUID(), name, total_entries: 1 };
  existing.total_entries = val;
  lsSetPlayer(name, existing);

  // Try DB
  if (dbOk) {
    try {
      const { data: dbRow } = await sb.from('rm_players').select('*').eq('name', name).single();
      if (dbRow) {
        await sb.from('rm_players').update({ total_entries: val }).eq('id', dbRow.id);
      } else {
        await sb.from('rm_players').insert({ name, total_entries: val });
      }
    } catch(e) { console.warn('DB setEntries failed', e); }
  }

  document.getElementById('admin-msg').textContent = `${name} → ${val} entries ✓`;
  if (currentPlayer && currentPlayer.name === name) {
    playerData.total_entries = val;
    updateEntryCount();
    renderEntryBar();
  }
  setTimeout(() => openAdmin(), 500);
}

async function lockAllBrackets() {
  try {
    await sb.from('rm_brackets').update({ submitted: true }).eq('submitted', false);
    document.getElementById('admin-lock-msg').textContent = 'All brackets locked';
    toast('All brackets locked');
  } catch(e) { document.getElementById('admin-lock-msg').textContent = 'Failed'; }
}

async function unlockAllBrackets() {
  try {
    await sb.from('rm_brackets').update({ submitted: false }).eq('submitted', true);
    document.getElementById('admin-lock-msg').textContent = 'All brackets unlocked';
    toast('All brackets unlocked');
  } catch(e) { document.getElementById('admin-lock-msg').textContent = 'Failed'; }
}

function closeAdmin() { document.getElementById('admin-panel').classList.remove('open'); }

/* ════════════════════════════════════════
   LEADERBOARD
   ════════════════════════════════════════ */
async function openLeaderboard() {
  await loadAllData();
  const list = document.getElementById('lb-list');
  list.innerHTML = '';

  // Group best score per player
  const playerScores = {};
  PLAYERS.forEach(p => { playerScores[p.name] = { name: p.name, img: p.img, bestScore: 0, entries: 0, submitted: 0 }; });
  allBracketsAll.forEach(b => {
    if (!playerScores[b.player_name]) return;
    playerScores[b.player_name].entries++;
    if (b.submitted) playerScores[b.player_name].submitted++;
    if ((b.score || 0) > playerScores[b.player_name].bestScore) {
      playerScores[b.player_name].bestScore = b.score || 0;
    }
  });

  const sorted = Object.values(playerScores).sort((a, b) => b.bestScore - a.bestScore || b.submitted - a.submitted);
  sorted.forEach((p, i) => {
    const rankCls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const div = document.createElement('div');
    div.className = 'lb-row';
    div.innerHTML = `
      <span class="lb-rank ${rankCls}">${i + 1}</span>
      <img class="lb-player-img" src="${p.img}" alt="${p.name}" onerror="this.style.display='none'">
      <span class="lb-name">${p.name}</span>
      <span class="lb-entries">${p.submitted} bracket${p.submitted !== 1 ? 's' : ''}</span>
      <span class="lb-score">${p.bestScore} pts</span>`;
    list.appendChild(div);
  });

  document.getElementById('lb-panel').classList.add('open');
}

function closeLeaderboard() { document.getElementById('lb-panel').classList.remove('open'); }

/* ════════════════════════════════════════
   UTILS
   ════════════════════════════════════════ */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

/* ════════════════════════════════════════
   INIT
   ════════════════════════════════════════ */
renderGate();
</script>
